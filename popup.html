<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 300px;
    background: #fff;
    color: #111827;
    font-size: 13px;
  }

  .header {
    padding: 13px 16px 11px;
    border-bottom: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon {
    width: 30px;
    height: 30px;
    background: #4f46e5;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: #111827;
    line-height: 1.3;
  }

  .header-sub {
    font-size: 11px;
    color: #9ca3af;
  }

  .form {
    padding: 13px 16px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  label {
    font-size: 11px;
    font-weight: 500;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"] {
    width: 100%;
    padding: 6px 9px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: #111827;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
  }

  input:focus {
    border-color: #4f46e5;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Segmented format toggle */
  .segment {
    display: flex;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    overflow: hidden;
    background: #f9fafb;
  }

  .seg-btn {
    flex: 1;
    padding: 5px 8px;
    border: none;
    background: transparent;
    font-size: 12px;
    font-family: inherit;
    color: #6b7280;
    cursor: pointer;
    font-weight: 400;
    transition: background 0.12s, color 0.12s;
    border-radius: 0;
    letter-spacing: normal;
  }

  .seg-btn + .seg-btn { border-left: 1px solid #e5e7eb; }

  .seg-btn.active {
    background: #fff;
    color: #111827;
    font-weight: 500;
  }

  .seg-btn:hover:not(.active) { background: #f3f4f6; color: #374151; }

  /* Folder field with inline prefix */
  .folder-wrap {
    display: flex;
    align-items: center;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    background: #f9fafb;
    overflow: hidden;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
  }

  .folder-wrap:focus-within {
    border-color: #4f46e5;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  .folder-wrap .prefix {
    padding: 6px 2px 6px 9px;
    color: #9ca3af;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
    user-select: none;
  }

  .folder-wrap input {
    flex: 1;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 6px 9px 6px 1px;
    min-width: 0;
  }

  .footer {
    padding: 2px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  button#export {
    width: 100%;
    padding: 8px 16px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.12s, opacity 0.12s;
  }

  button#export:hover:not(:disabled) { background: #4338ca; }
  button#export:active:not(:disabled) { background: #3730a3; }
  button#export:disabled { opacity: 0.5; cursor: default; }

  #status {
    min-height: 16px;
    font-size: 12px;
    color: #6b7280;
  }

  #status.success { color: #059669; }
  #status.error   { color: #dc2626; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📋</div>
    <div>
      <div class="header-title">History Digest</div>
      <div class="header-sub">Export browsing history to Obsidian</div>
    </div>
  </div>

  <div class="form">
    <div class="field">
      <label for="date">Date</label>
      <input type="date" id="date">
    </div>

    <div class="row">
      <div class="field">
        <label for="minVisits">Min visits</label>
        <input type="number" id="minVisits" value="1" min="1">
      </div>
      <div class="field">
        <label for="maxItems">Max items</label>
        <input type="number" id="maxItems" value="1000" min="1">
      </div>
    </div>

    <div class="field">
      <label>Format</label>
      <div class="segment" id="formatToggle">
        <button type="button" class="seg-btn active" data-fmt="md">Markdown</button>
        <button type="button" class="seg-btn" data-fmt="json">JSON</button>
      </div>
    </div>

    <div class="field">
      <label for="folder">Output folder</label>
      <div class="folder-wrap">
        <span class="prefix">~/Downloads/</span>
        <input type="text" id="folder" placeholder="obsidian-inbox">
      </div>
    </div>
  </div>

  <div class="footer">
    <button id="export">Export history</button>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
